<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Конвертер валют</title>
</head>
<body>
    <div class="converter-box">
        <h1>Курс валют (до 1 USD)</h1>
        <table>
            {% for currency, rate in rates.items() %}
            <tr><td>{{ currency }}</td><td>{{ rate }}</td></tr>
            {% endfor %}
        </table>

        <form method="post">
            <input type="number" name="amount" placeholder="Сума" required>
            <select name="from_curr">
                {% for curr in rates.keys() %}<option value="{{ curr }}">{{ curr }}</option>{% endfor %}
            </select>
            <select name="to_curr">
                {% for curr in rates.keys() %}<option value="{{ curr }}">{{ curr }}</option>{% endfor %}
            </select>
            <button type="submit">Розрахувати</button>
        </form>

        {% if result %}
            <div class="result-box">
                {{ amount }} {{ from_curr }} = <strong>{{ result }} {{ to_curr }}</strong>
            </div>
        {% endif %}
    </div>
</body>
</html>
